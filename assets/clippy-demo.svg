<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <defs>
    <!-- Body gradient -->
    <radialGradient id="bodyGrad" cx="0.47" cy="0.45" r="0.5" fx="0.47" fy="0.35">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="60%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </radialGradient>
    <!-- Belly gradient -->
    <radialGradient id="bellyGrad" cx="0.5" cy="0.45" r="0.5" fx="0.5" fy="0.4">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#81c784"/>
    </radialGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <!-- Head gradient -->
    <radialGradient id="headGrad" cx="0.47" cy="0.42" r="0.5" fx="0.44" fy="0.3">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="70%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#43a047"/>
    </radialGradient>
    <!-- Iris gradient -->
    <radialGradient id="irisGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#3d2b1a"/>
      <stop offset="70%" stop-color="#5a3d20"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <!-- Beak gradient -->
    <linearGradient id="beakGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <!-- Eye shadow filter -->
    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="rgba(0,0,0,0.2)"/>
    </filter>

    <style>
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes pupilMove { 0%,100% { transform: translate(0,0); } 20% { transform: translate(2px,-0.5px); } 45% { transform: translate(-1.5px,0.5px); } 70% { transform: translate(1px,-1px); } }
      @keyframes blink { 0%,44%,48%,100% { transform: scaleY(1); } 46% { transform: scaleY(0.05); } }
      @keyframes crestWave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes tailSway { 0%,100% { transform: rotate(0deg); } 30% { transform: rotate(-3deg); } 70% { transform: rotate(3deg); } }
      @keyframes heartUp1 { 0% { opacity:0; transform: translate(0,0) scale(0.3); } 15% { opacity:1; transform: translate(-6px,-12px) scale(1); } 100% { opacity:0; transform: translate(-14px,-50px) scale(0.4); } }
      @keyframes heartUp2 { 0% { opacity:0; transform: translate(0,0) scale(0.3); } 15% { opacity:0.9; transform: translate(4px,-10px) scale(0.9); } 100% { opacity:0; transform: translate(8px,-45px) scale(0.3); } }
      @keyframes heartUp3 { 0% { opacity:0; transform: translate(0,0) scale(0.3); } 15% { opacity:0.8; transform: translate(-2px,-8px) scale(0.8); } 100% { opacity:0; transform: translate(-5px,-42px) scale(0.2); } }
      @keyframes bubble { 0%,8% { opacity:0; transform: translateY(4px); } 12%,80% { opacity:1; transform: translateY(0); } 88%,100% { opacity:0; transform: translateY(-3px); } }
      @keyframes sparkle1 { 0%,100% { opacity:0; transform: scale(0) rotate(0deg); } 50% { opacity:1; transform: scale(1) rotate(180deg); } }
      @keyframes sparkle2 { 0%,100% { opacity:0; transform: scale(0) rotate(0deg); } 50% { opacity:0.8; transform: scale(0.8) rotate(180deg); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="260" rx="16" fill="#13111a"/>
  <rect x="1" y="1" width="518" height="258" rx="15" fill="none" stroke="#2a2840" stroke-width="1"/>

  <!-- Parrot group — centered, with gentle bob -->
  <g transform="translate(230, 36)" style="animation: bob 2.5s ease-in-out infinite;">

    <!-- Shadow under parrot -->
    <ellipse cx="2" cy="108" rx="30" ry="6" fill="rgba(0,0,0,0.2)"/>

    <!-- Branch -->
    <path d="M-42,103 Q0,96 42,103 L42,108 Q0,101 -42,108 Z" fill="#8B5E3C"/>
    <path d="M-42,106 Q0,102 42,106 L42,108 Q0,104 -42,108 Z" fill="#6d4830"/>
    <path d="M-36,104 Q0,98 36,104" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

    <!-- Tail feathers -->
    <g transform="translate(-16,0)" style="animation: tailSway 3.5s ease-in-out infinite; transform-origin: 16px 92px;">
      <path d="M-16,92 Q-36,106 -32,118 Q-26,110 -12,98 Z" fill="#2e7d32"/>
      <path d="M-20,90 Q-42,102 -38,114 Q-32,106 -16,95 Z" fill="#1b5e20" opacity="0.7"/>
      <path d="M-12,94 Q-28,110 -24,118 Q-20,112 -9,100 Z" fill="#388e3c" opacity="0.5"/>
    </g>

    <!-- Body -->
    <ellipse cx="0" cy="72" rx="22" ry="30" fill="url(#bodyGrad)"/>

    <!-- Belly -->
    <ellipse cx="0" cy="80" rx="14" ry="20" fill="url(#bellyGrad)"/>

    <!-- Wing -->
    <ellipse cx="-14" cy="70" rx="14" ry="22" fill="url(#wingGrad)" transform="rotate(8.6, -14, 70)"/>
    <!-- Wing feather lines -->
    <ellipse cx="-14" cy="60" rx="10" ry="16" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" transform="rotate(8.6, -14, 60)"/>
    <ellipse cx="-14" cy="67" rx="9" ry="13" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" transform="rotate(8.6, -14, 67)"/>
    <ellipse cx="-14" cy="74" rx="8" ry="10" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" transform="rotate(8.6, -14, 74)"/>

    <!-- Head -->
    <circle cx="0" cy="44" r="20" fill="url(#headGrad)"/>
    <!-- Head highlight -->
    <ellipse cx="-6" cy="36" rx="10" ry="8" fill="rgba(255,255,255,0.1)" transform="rotate(-17, -6, 36)"/>

    <!-- Crest feathers -->
    <g style="animation: crestWave 2s ease-in-out infinite; transform-origin: -2px 28px;">
      <path d="M-7,28 C-9,20 -8,14 -5,18 C-4,22 -3,26 -3,28 Z" fill="#ff6b35"/>
      <path d="M-3,26 C-4,18 -2,12 1,16 C2,20 1,24 0,26 Z" fill="#ff7043"/>
      <path d="M0,27 C1,20 4,16 6,20 C6,24 4,26 2,27 Z" fill="#ffab00"/>
    </g>

    <!-- Eye -->
    <g style="animation: blink 4.5s ease-in-out infinite; transform-origin: 8px 40px;">
      <!-- Eye white with shadow -->
      <ellipse cx="8" cy="40" rx="10" ry="9" fill="white" filter="url(#eyeShadow)" transform="rotate(2.9, 8, 40)"/>
      <!-- Eye outline -->
      <ellipse cx="8" cy="40" rx="10" ry="9" fill="none" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(2.9, 8, 40)"/>
      <!-- Iris + Pupil group that tracks -->
      <g style="animation: pupilMove 7s ease-in-out infinite;">
        <!-- Iris -->
        <circle cx="10" cy="39" r="5.5" fill="url(#irisGrad)"/>
        <!-- Pupil -->
        <circle cx="10" cy="39" r="3" fill="#0a0a0a"/>
        <!-- Eye shine -->
        <circle cx="12.5" cy="36.5" r="2.2" fill="white"/>
        <circle cx="7.5" cy="41.5" r="1.2" fill="white" opacity="0.6"/>
      </g>
    </g>

    <!-- Beak top -->
    <path d="M18,41 C24,39 32,41 31,46 C28,47 22,47 18,46 Z" fill="url(#beakGrad)"/>
    <!-- Beak bottom -->
    <path d="M18,47 C22,47 28,48 26,52 C22,53 18,51 16,49 Z" fill="#e68a00"/>
    <!-- Beak line -->
    <path d="M18,46.5 C22,46 28,46.5 30,46.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.6"/>
    <!-- Nostril -->
    <ellipse cx="23" cy="43.5" rx="1.3" ry="0.9" fill="rgba(0,0,0,0.25)"/>

    <!-- Feet -->
    <!-- Left leg -->
    <path d="M-9,96 L-12,103 L-5,103 Z" fill="#e8870e"/>
    <!-- Right leg -->
    <path d="M9,96 L6,103 L13,103 Z" fill="#e8870e"/>
    <!-- Left toes -->
    <line x1="-15" y1="103" x2="-2" y2="103" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-14" y1="101" x2="-14" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-2" y1="101" x2="-2" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Right toes -->
    <line x1="3" y1="103" x2="16" y2="103" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="4" y1="101" x2="4" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="16" y1="101" x2="16" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>

  </g>

  <!-- Floating hearts -->
  <g transform="translate(210, 70)">
    <text font-size="14" fill="#ff4081" style="animation: heartUp1 5s ease-out infinite;">&#x2764;&#xFE0E;</text>
    <text font-size="11" fill="#ff6b9d" x="18" y="5" style="animation: heartUp2 5s ease-out infinite; animation-delay: 1.8s;">&#x2764;&#xFE0E;</text>
    <text font-size="9" fill="#ff8eb5" x="6" y="8" style="animation: heartUp3 5s ease-out infinite; animation-delay: 3.2s;">&#x2764;&#xFE0E;</text>
  </g>

  <!-- Sparkles -->
  <g transform="translate(268, 52)">
    <text font-size="14" fill="#ffd740" style="animation: sparkle1 4s ease-in-out infinite; animation-delay: 0.8s;">&#x2728;</text>
    <text font-size="10" fill="#ffd740" x="22" y="-14" style="animation: sparkle2 4s ease-in-out infinite; animation-delay: 2.5s;">&#x2728;</text>
    <text font-size="8" fill="#ffe082" x="-10" y="-20" style="animation: sparkle1 3.5s ease-in-out infinite; animation-delay: 1.5s;">&#x2728;</text>
  </g>

  <!-- Speech bubble -->
  <g style="animation: bubble 10s ease-in-out infinite;">
    <rect x="32" y="76" width="140" height="40" rx="14" fill="white" opacity="0.96"/>
    <polygon points="172,90 184,98 172,100" fill="white" opacity="0.96"/>
    <text x="56" y="101" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" fill="#333" font-weight="500">Nice keystrokes!</text>
  </g>

  <!-- Tagline -->
  <text x="260" y="242" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#555" letter-spacing="0.5">your desktop coding buddy</text>
</svg>
