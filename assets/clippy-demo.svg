<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="500">
  <defs>
    <radialGradient id="bodyGrad" gradientUnits="userSpaceOnUse" cx="64" cy="72" r="30" fx="60" fy="65">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="60%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </radialGradient>
    <radialGradient id="bellyGrad" gradientUnits="userSpaceOnUse" cx="64" cy="80" r="20" fx="64" fy="78">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#81c784"/>
    </radialGradient>
    <linearGradient id="wingGrad" gradientUnits="userSpaceOnUse" x1="38" y1="50" x2="62" y2="90">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <radialGradient id="headGrad" gradientUnits="userSpaceOnUse" cx="64" cy="44" r="20" fx="60" fy="38">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="70%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#43a047"/>
    </radialGradient>
    <radialGradient id="irisGrad" gradientUnits="userSpaceOnUse" cx="74" cy="39" r="6" fx="74" fy="39">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#3d2b1a"/>
      <stop offset="70%" stop-color="#5a3d20"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <linearGradient id="beakGrad" gradientUnits="userSpaceOnUse" x1="82" y1="40" x2="96" y2="48">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <filter id="eyeShadow"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="rgba(0,0,0,0.25)"/></filter>
    <style>
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes blink { 0%,43%,47%,100% { transform: scaleY(1); } 45% { transform: scaleY(0.05); } }
      @keyframes pupil { 0%,100% { transform: translate(0,0); } 25% { transform: translate(1.5px,-0.5px); } 50% { transform: translate(-1px,0.5px); } 75% { transform: translate(1px,-0.8px); } }
      @keyframes crest { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes tail { 0%,100% { transform: rotate(0deg); } 30% { transform: rotate(-3deg); } 70% { transform: rotate(3deg); } }
      @keyframes heart { 0% { opacity:0; transform: translate(0,0) scale(0.3); } 15% { opacity:1; } 100% { opacity:0; transform: translate(-10px,-40px) scale(0.5); } }
      @keyframes bubble { 0%,10% { opacity:0; } 15%,82% { opacity:1; } 88%,100% { opacity:0; } }
      @keyframes sparkle { 0%,100% { opacity:0; transform: scale(0); } 50% { opacity:1; transform: scale(1); } }
    </style>
  </defs>

  <rect width="400" height="220" rx="14" fill="#13111a"/>
  <rect x="1" y="1" width="398" height="218" rx="13" fill="none" stroke="#2a2840" stroke-width="0.5"/>

  <!-- Speech bubble -->
  <g style="animation: bubble 9s ease-in-out infinite;" opacity="0">
    <rect x="10" y="50" width="170" height="36" rx="12" fill="white" opacity="0.97"/>
    <polygon points="180,63 190,70 180,73" fill="white" opacity="0.97"/>
    <text x="32" y="73" font-family="-apple-system, Helvetica, sans-serif" font-size="13" fill="#333" font-weight="500">Let's build something.</text>
  </g>

  <!-- Parrot at 1.3x scale -->
  <g transform="translate(134, 14) scale(1.3)">
    <g style="animation: bob 2.5s ease-in-out infinite;">

      <!-- Shadow -->
      <ellipse cx="66" cy="108" rx="30" ry="7" fill="rgba(0,0,0,0.2)"/>

      <!-- Branch -->
      <path d="M22,103 Q64,96 106,103 L106,108 Q64,101 22,108 Z" fill="#8B5E3C"/>
      <path d="M22,106 Q64,102 106,106 L106,108 Q64,104 22,108 Z" fill="#6d4830"/>
      <path d="M28,104 Q64,98 100,104" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

      <!-- Tail feathers -->
      <g style="animation: tail 3.5s ease-in-out infinite; transform-origin: 48px 92px;">
        <path d="M48,92 Q28,106 32,118 Q38,110 52,98 Z" fill="#2e7d32"/>
        <path d="M44,90 Q22,102 26,114 Q32,106 48,95 Z" fill="#1b5e20" opacity="0.7"/>
        <path d="M52,94 Q36,110 40,118 Q44,112 55,100 Z" fill="#388e3c" opacity="0.5"/>
      </g>

      <!-- Body -->
      <ellipse cx="64" cy="72" rx="22" ry="30" fill="url(#bodyGrad)"/>
      <!-- Belly -->
      <ellipse cx="64" cy="80" rx="14" ry="20" fill="url(#bellyGrad)"/>

      <!-- Wing -->
      <ellipse cx="50" cy="70" rx="14" ry="22" fill="url(#wingGrad)" transform="rotate(8.6, 50, 70)"/>
      <ellipse cx="50" cy="60" rx="10" ry="16" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" transform="rotate(8.6, 50, 60)"/>
      <ellipse cx="50" cy="67" rx="9" ry="13" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" transform="rotate(8.6, 50, 67)"/>
      <ellipse cx="50" cy="74" rx="8" ry="10" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" transform="rotate(8.6, 50, 74)"/>
      <ellipse cx="50" cy="81" rx="7" ry="7" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" transform="rotate(8.6, 50, 81)"/>

      <!-- Head -->
      <circle cx="64" cy="44" r="20" fill="url(#headGrad)"/>
      <ellipse cx="58" cy="36" rx="10" ry="8" fill="rgba(255,255,255,0.1)" transform="rotate(-17, 58, 36)"/>

      <!-- Crest -->
      <g style="animation: crest 2s ease-in-out infinite; transform-origin: 62px 28px;">
        <path d="M57,28 C55,20 56,14 59,18 C60,22 61,26 61,28 Z" fill="#ff6b35"/>
        <path d="M61,26 C60,18 62,12 65,16 C66,20 65,24 64,26 Z" fill="#ff7043"/>
        <path d="M64,27 C65,20 68,16 70,20 C70,24 68,26 66,27 Z" fill="#ffab00"/>
      </g>

      <!-- Eye -->
      <g style="animation: blink 4.5s ease-in-out infinite; transform-origin: 72px 40px;">
        <ellipse cx="72" cy="40" rx="10" ry="9" fill="white" filter="url(#eyeShadow)" transform="rotate(2.9, 72, 40)"/>
        <ellipse cx="72" cy="40" rx="10" ry="9" fill="none" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(2.9, 72, 40)"/>
        <g style="animation: pupil 7s ease-in-out infinite;">
          <circle cx="74" cy="39" r="5.5" fill="url(#irisGrad)"/>
          <circle cx="74" cy="39" r="3" fill="#0a0a0a"/>
          <circle cx="76.5" cy="36.5" r="2.2" fill="white"/>
          <circle cx="71.5" cy="41.5" r="1.2" fill="white" opacity="0.6"/>
        </g>
      </g>

      <!-- Beak -->
      <path d="M82,41 C88,39 96,41 95,46 C92,47 86,47 82,46 Z" fill="url(#beakGrad)"/>
      <path d="M82,47 C86,47 92,48 90,52 C86,53 82,51 80,49 Z" fill="#e68a00"/>
      <path d="M82,46.5 C86,46 92,46.5 94,46.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.6"/>
      <ellipse cx="87" cy="43.5" rx="1.3" ry="0.9" fill="rgba(0,0,0,0.25)"/>

      <!-- Feet -->
      <path d="M55,96 L52,103 L59,103 Z" fill="#e8870e"/>
      <path d="M73,96 L70,103 L77,103 Z" fill="#e8870e"/>
      <line x1="49" y1="103" x2="62" y2="103" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="50" y1="101" x2="50" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="62" y1="101" x2="62" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="67" y1="103" x2="80" y2="103" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="68" y1="101" x2="68" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="80" y1="101" x2="80" y2="105" stroke="#e8870e" stroke-width="2.8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Hearts -->
  <g transform="translate(230, 48)">
    <text font-size="14" fill="#ff4081" style="animation: heart 5s ease-out infinite;">&#x2764;&#xFE0E;</text>
    <text font-size="11" fill="#ff6b9d" x="16" y="4" style="animation: heart 5s ease-out infinite; animation-delay: 1.8s;">&#x2764;&#xFE0E;</text>
    <text font-size="9" fill="#ff8eb5" x="5" y="7" style="animation: heart 5s ease-out infinite; animation-delay: 3.2s;">&#x2764;&#xFE0E;</text>
  </g>

  <!-- Sparkles -->
  <g transform="translate(280, 40)">
    <text font-size="13" fill="#ffd740" style="animation: sparkle 4s ease-in-out infinite; animation-delay: 0.5s;">&#x2728;</text>
    <text font-size="9" fill="#ffe082" x="20" y="-12" style="animation: sparkle 3.5s ease-in-out infinite; animation-delay: 2s;">&#x2728;</text>
  </g>

  <text x="200" y="208" text-anchor="middle" font-family="-apple-system, Helvetica, sans-serif" font-size="11" fill="#555" letter-spacing="0.5">your desktop coding buddy</text>
</svg>
